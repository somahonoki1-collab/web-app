<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>記録の編集 - Workout Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* トップページと同じダークモードのデザイン */
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #0f172a; color: #f8fafc; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 480px; width: 100%; }
        .app-header { text-align: center; margin-bottom: 30px; }
        .app-title { font-size: 28px; font-weight: 900; margin: 0; background: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card { background: #1e293b; border-radius: 16px; padding: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 8px; color: #94a3b8; }
        input, select { width: 100%; padding: 14px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #fff; font-size: 16px; box-sizing: border-box; transition: all 0.3s ease; }
        input:focus, select:focus { outline: none; border-color: #f59e0b; box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.2); }
        .btn-primary { width: 100%; padding: 16px; border: none; border-radius: 8px; background: linear-gradient(135deg, #f59e0b, #ef4444); color: white; font-size: 16px; font-weight: 700; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; margin-top: 10px; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(239, 68, 68, 0.4); }
        .btn-cancel { display: block; text-align: center; width: 100%; padding: 16px; border: 1px solid #64748b; border-radius: 8px; background: transparent; color: #94a3b8; font-size: 16px; font-weight: 700; text-decoration: none; box-sizing: border-box; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="app-header">
            <h1 class="app-title">EDIT LOG</h1>
            <p style="color: #94a3b8; font-size: 14px;">記録の修正</p>
        </div>
        
        <div class="card">
            <!-- actionの送り先を /edit/〇〇 に指定して、POSTで送る -->
            <form method="POST" action="/edit/{{ log.id }}">
                
                <div class="form-group">
                    <label>📅 記録日時</label>
                    <!-- Pythonから渡された日時を初期値(value)としてセット -->
                    <input type="datetime-local" name="date" required value="{{ log.date.strftime('%Y-%m-%dT%H:%M') }}">
                </div>

                <div class="form-group">
                    <label>📝 種目</label>
                    <select name="lift_type" required>
                        <!-- 元の種目が選ばれた状態にするためのif文 -->
                        <option value="ベンチプレス" {% if log.lift_type == 'ベンチプレス' %}selected{% endif %}>ベンチプレス</option>
                        <option value="スクワット" {% if log.lift_type == 'スクワット' %}selected{% endif %}>スクワット</option>
                        <option value="その他" {% if log.lift_type == 'その他' %}selected{% endif %}>その他(ダンベル等)</option>
                    </select>
                </div>
                
                <div style="display: flex; gap: 15px;">
                    <div class="form-group" style="flex: 1;">
                        <label>🏋️ 重量 (kg)</label>
                        <!-- 元の重量を初期値(value)としてセット -->
                        <input type="number" step="0.5" name="weight" required value="{{ log.weight }}">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>🔄 回数 (回)</label>
                        <!-- 元の回数を初期値(value)としてセット -->
                        <input type="number" name="reps" required value="{{ log.reps }}">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>🎯 次回の目標レップ数 (回)</label>
                    <!-- 元の目標回数を初期値(value)としてセット -->
                    <input type="number" name="target_reps" required value="{{ log.target_reps }}">
                </div>
                
                <button type="submit" class="btn-primary">上書き保存する</button>
                <a href="/" class="btn-cancel">キャンセルして戻る</a>
            </form>
        </div>
    </div>
</body>
</html>
