{% extends "base.html" %}

{% block content %}
<div class="app-header">
    <h1 style="font-size: 28px; font-weight: 900; text-align: center; background: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">EDIT LOG</h1>
    <p style="text-align: center; color: #94a3b8; font-size: 14px;">記録の修正</p>
</div>

<div class="card" style="background: #1e293b; border-radius: 16px; padding: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.5);">
    <form method="POST" action="/edit/{{ log.id }}">
        
        <div class="form-group" style="margin-bottom: 20px;">
            <label style="display: block; font-size: 13px; font-weight: 700; margin-bottom: 8px; color: #94a3b8;">📅 記録日時</label>
            <input type="datetime-local" name="date" required value="{{ log.date.strftime('%Y-%m-%dT%H:%M') }}" style="width: 100%; padding: 14px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #fff; font-size: 16px;">
        </div>

        <div class="form-group" style="margin-bottom: 20px;">
            <label style="display: block; font-size: 13px; font-weight: 700; margin-bottom: 8px; color: #94a3b8;">📝 種目</label>
            <select name="lift_type" required style="width: 100%; padding: 14px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #fff; font-size: 16px;">
                <option value="ベンチプレス" {% if log.lift_type == 'ベンチプレス' %}selected{% endif %}>ベンチプレス</option>
                <option value="スクワット" {% if log.lift_type == 'スクワット' %}selected{% endif %}>スクワット</option>
                <option value="その他" {% if log.lift_type == 'その他' %}selected{% endif %}>その他(ダンベル等)</option>
            </select>
        </div>
        
        <div style="display: flex; gap: 15px; margin-bottom: 20px;">
            <div style="flex: 1;">
                <label style="display: block; font-size: 13px; font-weight: 700; margin-bottom: 8px; color: #94a3b8;">🏋️ 重量 (kg)</label>
                <input type="number" step="0.5" name="weight" required value="{{ log.weight }}" style="width: 100%; padding: 14px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #fff; font-size: 16px;">
            </div>
            <div style="flex: 1;">
                <label style="display: block; font-size: 13px; font-weight: 700; margin-bottom: 8px; color: #94a3b8;">🔄 回数 (回)</label>
                <input type="number" name="reps" required value="{{ log.reps }}" style="width: 100%; padding: 14px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #fff; font-size: 16px;">
            </div>
        </div>
        
        <div class="form-group" style="margin-bottom: 20px;">
            <label style="display: block; font-size: 13px; font-weight: 700; margin-bottom: 8px; color: #94a3b8;">🎯 目標レップ数 (回)</label>
            <input type="number" name="target_reps" required value="{{ log.target_reps }}" style="width: 100%; padding: 14px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #fff; font-size: 16px;">
        </div>
        
        <button type="submit" style="width: 100%; padding: 16px; border: none; border-radius: 8px; background: linear-gradient(135deg, #f59e0b, #ef4444); color: white; font-size: 16px; font-weight: 700; cursor: pointer;">上書き保存する</button>
        <a href="/" style="display: block; text-align: center; width: 100%; padding: 16px; color: #94a3b8; font-size: 14px; text-decoration: none; margin-top: 15px;">キャンセルして戻る</a>
    </form>
</div>
{% endblock %}
