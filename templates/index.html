<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>トレーニング記録アプリ</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f4f7f6; color: #333; text-align: center; padding: 50px; }
        .container { background-color: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: 0 auto; }
        h1 { color: #2c3e50; font-size: 24px; }
        .goal { font-weight: bold; color: #e74c3c; font-size: 20px; }
        .menu { background: #ecf0f1; padding: 10px; border-radius: 5px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>My Training Log</h1>
        <p class="goal">🎯 目標: ベンチプレス 100kg</p>
        <div class="menu">
            <p>今日のルーティン: <strong>PPL (Push)</strong></p>
        </div>
    </div>
</body>
</html>
